<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EPIRIS — Find Care That Fits You.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F2748;            /* 로고 네이비 */
    --brand:#0F2748;          /* 네이비 (메인) */
    --brand-2:#1DB7A6;        /* 틸 (액센트) */
    --gold:#1DB7A6;           /* 액센트 = 틸 */
    --paper:#FAFBFC;          /* 밝은 종이색 */
    --paper-2:#EEF1F4;
    --line:#DEE3E8;
    --sub:#5b6673;
    --iris:#1DB7A6;           /* 안내 액센트 = 틸 */
    --danger:#c14a34;
    --radius:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Noto Sans','Noto Sans KR',sans-serif;
    background:var(--paper); color:var(--ink);
    overflow-x:hidden;
  }
  .screen{display:none;min-height:100vh;}
  .screen.on{display:block;}

  /* ---------- 화면 1: 언어 선택 ---------- */
  #langScreen{
    display:none;
    min-height:100vh;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(29,92,54,0.10), transparent 60%),
      linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
    flex-direction:column; align-items:center; justify-content:center;
    padding:40px 24px;
  }
  #langScreen.on{display:flex;}
  .hero{ text-align:center; margin-bottom:44px; }
  .brand{
    font-family:'Fraunces',serif; font-weight:600;
    font-size:clamp(52px, 9vw, 92px); letter-spacing:-0.02em;
    color:var(--brand); line-height:1; margin:0;
  }
  .brand .dot{color:var(--gold);}
  .tagline{
    font-family:'Fraunces',serif; font-weight:400; font-style:italic;
    font-size:clamp(20px, 3.4vw, 32px); color:var(--ink);
    margin-top:14px; opacity:.85;
  }
  .subline{ font-size:14px; color:var(--sub); margin-top:10px; letter-spacing:.02em;}
  .logo-mark{ width:120px;height:auto;margin:0 auto 4px;display:block; }
  .logo-mark-sm{ height:30px;width:auto;display:block; }

  .langgrid{
    display:grid; grid-template-columns:repeat(3, minmax(140px, 200px));
    gap:16px; width:100%; max-width:680px;
    align-items:stretch;
  }
  @media(max-width:560px){ .langgrid{grid-template-columns:repeat(2,1fr); gap:12px;} }
  .langbtn{
    background:#fff; border:1.5px solid var(--line); border-radius:var(--radius);
    padding:22px 12px 16px; cursor:pointer; text-align:center;
    transition:transform .12s ease, border-color .12s, box-shadow .12s;
    display:flex; flex-direction:column; align-items:center; gap:8px;
    min-height:150px; justify-content:flex-start;
  }
  .langbtn:hover,.langbtn:active{ transform:translateY(-3px); border-color:var(--brand); box-shadow:0 10px 24px rgba(15,39,72,.12); }
  /* 국기 영역을 고정 크기로 → 카드 높이 일정 */
  .langbtn .flagwrap{ height:44px; display:flex; align-items:center; justify-content:center; margin-bottom:2px; }
  .langbtn .flag{ font-size:38px; line-height:1; }
  .langbtn .flagimg{ width:56px; height:38px; object-fit:cover; border-radius:5px; box-shadow:0 1px 4px rgba(0,0,0,.14); }
  .langbtn .lname{ font-weight:700; font-size:16px; color:var(--ink); }
  .langbtn .lnative{ font-size:12px; color:var(--sub); }
  .langbtn.kor{ border-color:var(--brand-2); background:linear-gradient(180deg,#f4fdfb,#fff); }
  .langbtn.kor .lname{ color:var(--brand); }
  .kor-note{ font-size:11px; color:var(--brand-2); font-weight:700; }

  /* ---------- 화면 2: 검색 + Top10 ---------- */
  #findScreen{ display:none; min-height:100vh; flex-direction:column; }
  #findScreen.on{ display:flex; }
  .topbar{
    background:var(--brand); color:#fff; padding:16px 20px;
    display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:30;
  }
  .topbar{ align-items:center; }
  .topbar .logo{ font-family:'Fraunces',serif; font-weight:600; font-size:22px; margin-left:8px; }
  .logo-mark-sm{ vertical-align:middle; }
  .topbar .logo .dot{color:#EBD48A;}
  .homebtn{
    margin-left:auto; background:rgba(255,255,255,.14); color:#fff; border:none;
    padding:10px 16px; border-radius:30px; font-size:14px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; gap:6px; font-family:inherit;
  }
  .homebtn:active{ background:rgba(255,255,255,.28); }

  .findwrap{ max-width:760px; margin:0 auto; width:100%; padding:24px 20px 60px; }
  @media(max-width:560px){ .findwrap{ padding:18px 12px 50px; } }

  .searchcard{
    background:#fff; border:1.5px solid var(--line); border-radius:22px;
    padding:10px 10px 10px 20px; display:flex; align-items:center; gap:10px;
    box-shadow:0 6px 20px rgba(18,38,28,.06);
  }
  .searchcard svg.si{ color:var(--sub); flex-shrink:0; }
  #q{ flex:1; border:none; outline:none; font-size:19px; padding:14px 4px; background:transparent; font-family:inherit; color:var(--ink); min-width:0;}
  .micbtn{
    width:52px;height:52px;border-radius:50%; border:none; cursor:pointer; flex-shrink:0;
    background:var(--paper-2); color:var(--brand); display:flex;align-items:center;justify-content:center;
    transition:background .15s, transform .15s;
  }
  .micbtn:active{ transform:scale(.94); }
  .micbtn.listening{ background:var(--danger); color:#fff; animation:pulse 1.1s infinite; }
  @keyframes pulse{ 0%,100%{box-shadow:0 0 0 0 rgba(181,70,47,.4);} 50%{box-shadow:0 0 0 12px rgba(181,70,47,0);} }
  .gobtn{
    border:none; background:var(--brand); color:#fff; border-radius:16px; height:52px; padding:0 20px;
    font-size:16px; font-weight:700; cursor:pointer; flex-shrink:0; font-family:inherit;
  }
  .gobtn:active{ background:#154226; }

  /* 모바일: 검색창 요소 축소해 글씨 안 잘리게 */
  @media(max-width:560px){
    .searchcard{ padding:6px 6px 6px 14px; gap:6px; border-radius:18px; }
    .searchcard svg.si{ width:18px; height:18px; }
    #q{ font-size:16px; padding:12px 2px; }
    .micbtn{ width:44px; height:44px; }
    .micbtn svg{ width:19px; height:19px; }
    .gobtn{ height:44px; padding:0 14px; font-size:15px; border-radius:13px; }
  }

  .hint2{ font-size:13px; color:var(--sub); margin:12px 4px 0; min-height:18px;}

  .sectlabel{ font-size:14px; font-weight:700; color:var(--ink); margin:34px 4px 14px; display:flex; align-items:center; gap:8px;}
  .sectlabel .pill{ font-size:11px; background:var(--paper-2); color:var(--sub); padding:3px 9px; border-radius:20px; font-weight:600;}

  .toprank-head{ display:flex; align-items:center; gap:10px; margin:36px 4px 16px; }
  .toprank-head .trophy{ font-size:24px; }
  .toprank-head .toprank-title{ font-size:20px; font-weight:800; color:var(--ink); letter-spacing:-0.01em; }
  .toprank-head .toprank-badge{ font-size:12px; font-weight:800; color:#fff; background:var(--brand); padding:4px 11px; border-radius:20px; letter-spacing:.04em; }
  .toprank-head .pill{ margin-left:auto; font-size:11px; background:var(--paper-2); color:var(--sub); padding:4px 10px; border-radius:20px; font-weight:600; }

  .topgrid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:12px; }
  .topcard{
    position:relative;
    background:#fff; border:1.5px solid var(--line); border-radius:16px; overflow:hidden;
    cursor:pointer; text-align:center; transition:transform .12s, border-color .12s, box-shadow .12s;
    display:flex; flex-direction:column;
  }
  .topcard:hover,.topcard:active{ transform:translateY(-3px); border-color:var(--brand); box-shadow:0 8px 20px rgba(15,39,72,.12); }
  .topcard .imgbox{ width:100%; aspect-ratio:1/1; background:#fff; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .topcard .imgbox img{ width:100%; height:100%; object-fit:contain; padding:10px; }
  .topcard .imgbox .noimg{ font-size:34px; color:var(--line); }
  .topcard .rank{ position:absolute; top:8px; left:8px; z-index:2; background:var(--sub); color:#fff; font-size:12px; font-weight:700; width:24px;height:24px;border-radius:50%; display:flex;align-items:center;justify-content:center;}
  .topcard .tname{ font-weight:700; font-size:15px; padding:12px 10px 14px; color:var(--ink); line-height:1.3;}

  /* 상위 3위 강조 (금·은·동) */
  .topcard.top3{ border-width:2px; }
  .topcard.top3 .rank.medal{ width:30px;height:30px;font-size:14px; box-shadow:0 2px 6px rgba(0,0,0,.2); border:2px solid #fff; }
  .topcard.top3 .tname{ font-size:16px; }
  .topcard.top3::before{ content:""; position:absolute; top:0; left:0; right:0; height:5px; z-index:1; }
  .topcard.gold{ border-color:#E3B341; }
  .topcard.gold::before{ background:linear-gradient(90deg,#F2CE5B,#D8A62C); }
  .topcard.gold .rank.medal{ background:linear-gradient(180deg,#F2CE5B,#D8A62C); }
  .topcard.silver{ border-color:#B9C2CC; }
  .topcard.silver::before{ background:linear-gradient(90deg,#D3DAE1,#A9B4BF); }
  .topcard.silver .rank.medal{ background:linear-gradient(180deg,#C6CFD8,#9AA6B2); }
  .topcard.bronze{ border-color:#C99461; }
  .topcard.bronze::before{ background:linear-gradient(90deg,#DCA878,#B67C4B); }
  .topcard.bronze .rank.medal{ background:linear-gradient(180deg,#DCA878,#B67C4B); }

  /* ---------- 드릴다운 ---------- */
  .chips{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:6px;}
  .selchip{
    background:var(--brand); color:#fff; border-radius:30px; padding:9px 14px; font-size:15px; font-weight:700;
    display:inline-flex; align-items:center; gap:8px; cursor:pointer; animation:pop .25s ease;
  }
  @keyframes pop{ from{transform:scale(.8); opacity:0;} to{transform:scale(1); opacity:1;} }
  .selchip .x{ opacity:.8; }
  .resetlink{ background:none; border:none; color:var(--sub); font-size:13px; text-decoration:underline; cursor:pointer; font-family:inherit;}

  .countline{ font-size:14px; color:var(--sub); margin:4px 4px 16px;}
  .countline b{ color:var(--brand); }

  .nexttags{ display:flex; flex-wrap:wrap; gap:10px; margin-bottom:24px;}
  .nexttag{
    background:#fff; border:1.5px solid var(--line); border-radius:30px; padding:11px 16px; font-size:15px; cursor:pointer;
    display:inline-flex; align-items:center; gap:8px; transition:border-color .12s, background .12s;
  }
  .nexttag:hover,.nexttag:active{ border-color:var(--brand); background:var(--paper-2); }
  .nexttag .cnt{ font-size:12px; color:var(--sub);}
  .nexttag .ti{ width:22px;height:22px;border-radius:6px;object-fit:cover;}
  .nexttag.soon{ background:var(--paper-2); border-style:dashed; color:var(--sub); cursor:default; }
  .nexttag.soon:hover{ border-color:var(--line); background:var(--paper-2); }
  .nexttag.soon .cnt{ font-size:11px; color:var(--gold); font-weight:600; }

  .prodgrid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:14px; }
  .prodcard{
    background:#fff; border:1.5px solid var(--line); border-radius:16px; overflow:hidden; cursor:pointer;
    transition:transform .12s, box-shadow .12s; display:flex; flex-direction:column;
  }
  .prodcard:hover,.prodcard:active{ transform:translateY(-3px); box-shadow:0 8px 20px rgba(18,38,28,.1); }
  .prodcard .imgbox{ width:100%; aspect-ratio:1/1; display:flex;align-items:center;justify-content:center; background:#fff; overflow:hidden;}
  .prodcard .imgbox img{ width:100%;height:100%;object-fit:contain; padding:8px;}
  .prodcard .pname{ padding:12px; font-weight:500; font-size:14px; line-height:1.35; color:var(--ink);
    display:-webkit-box; -webkit-line-clamp:2; line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:2.7em;}

  .fallback{ background:#fff7ea; border:1.5px solid #f0d9a8; border-radius:16px; padding:18px; margin-bottom:20px;}
  .fallback .fbtitle{ font-weight:700; color:#8a5a12; margin-bottom:12px; font-size:15px;}

  /* ---------- info 모달 ---------- */
  .modal-ov{ position:fixed; inset:0; background:rgba(18,38,28,.55); z-index:100; display:none; align-items:flex-start; justify-content:center; padding:24px; overflow-y:auto;}
  .modal-ov.on{ display:flex; }
  .modal{ background:#fff; border-radius:22px; width:100%; max-width:520px; margin:auto; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.3); }
  .modal-head{ display:flex; align-items:center; padding:14px 18px; border-bottom:1px solid var(--line); position:sticky; top:0; background:#fff; }
  .modal-head .mt{ font-weight:700; font-size:15px; color:var(--brand);}
  .modal-close{ margin-left:auto; background:var(--paper-2); border:none; width:38px;height:38px;border-radius:50%; font-size:18px; cursor:pointer; color:var(--ink);}
  .modal-body{ padding:0; }
  .modal iframe{ width:100%; height:70vh; border:0; display:block;}
  .qrrow{ padding:16px 18px; border-top:1px solid var(--line); display:flex; align-items:center; gap:14px; background:var(--paper);}
  .qrrow img{ width:96px;height:96px; border:1px solid var(--line); border-radius:10px; background:#fff;}
  .qrrow .qtext{ font-size:14px; color:var(--ink); line-height:1.5;}
  .qrrow .qtext b{ color:var(--brand);}

  .empty{ text-align:center; color:var(--sub); padding:50px 16px; }
  .loading{ text-align:center; color:var(--sub); padding:40px;}

  .conn{ position:fixed; bottom:10px; right:12px; font-size:11px; color:var(--sub); background:#fff; border:1px solid var(--line); padding:4px 10px; border-radius:20px; z-index:5;}
</style>
</head>

async function loadData(){
  if(!USE_FIREBASE){ loadDemo(); buildLangGrid(); return; }
  try{
    const [psnap, tsnap, ttags] = await Promise.all([
      db.collection("products").get(),
      db.collection("tag_master").get(),
      db.collection("product_tags").get()
    ]);
    const tagMap={}; ttags.forEach(d=> tagMap[d.id]=d.data());
    PRODUCTS=[];
    psnap.forEach(d=>{
      const p=d.data();
      PRODUCTS.push({
        id:d.id, name:p.name||d.id, image:p.image||"", qrImage:p.qrImage||"",
        views:(p.views||0)+(p.views_public||0),
        tag_ids:(tagMap[d.id]&&tagMap[d.id].tag_ids)?tagMap[d.id].tag_ids:[]
      });
    });
    TAG_MASTER={}; tsnap.forEach(d=> TAG_MASTER[d.id]=d.data());

    // ★ 안전 게이트: 의약품/비의약품 구분 태그가 없는 제품은 고객에게 노출하지 않음
    //   (미분류 제품이 판매·검색 목록에 뜨는 것을 원천 차단)
    const medId = findTagIdByName("의약품");
    const nonId = findTagIdByName("비의약품");
    if(medId || nonId){
      PRODUCTS = PRODUCTS.filter(p =>
        (medId && p.tag_ids.includes(medId)) || (nonId && p.tag_ids.includes(nonId))
      );
    }
    // (구분 태그 자체가 아직 하나도 안 만들어졌으면 게이트를 적용하지 않음 - 초기 상태 보호)

    document.getElementById('conn').style.display="none";
  }catch(e){ console.error(e); loadDemo(); }
  buildLangGrid();
}

  return Object.keys(TAG_MASTER).find(id =>
    ((TAG_MASTER[id].names && TAG_MASTER[id].names.kr) || TAG_MASTER[id].raw || "") === name
  ) || null;
}

/* ============================================================
   태그 이름 (선택 언어)
   ============================================================ */
// 의약품/비의약품 구분 태그는 내부 분류용 → 고객 태그 칩/Top10에 노출 안 함
function isClassTag(tid){
  const nm=(TAG_MASTER[tid] && TAG_MASTER[tid].names && TAG_MASTER[tid].names.kr) || (TAG_MASTER[tid]&&TAG_MASTER[tid].raw) || "";
  return nm==="의약품" || nm==="비의약품";
}
function tagName(tid){
  const t=TAG_MASTER[tid]; if(!t) return "";
  return (t.names&&t.names[curLang]) || (t.names&&t.names.kr) || t.raw || tid;
}
// 태그 대표 이미지 = 그 태그 제품 중 조회수 최고
function tagIcon(tid){
  let best=null;
  PRODUCTS.forEach(p=>{ if(p.tag_ids.includes(tid) && p.image){ if(!best||p.views>best.views) best=p; }});
  return best?best.image:"";
}

/* ============================================================
   Top 10
   ============================================================ */
async function renderTop10(){
  const grid=document.getElementById('topgrid');
  let ranking=[];
  if(USE_FIREBASE){
    try{
      const snap=await db.collection("kiosk_first_tags").where("lang","==",curLang).get();
      const cnt={};
      snap.forEach(d=>{ const t=d.data().tag_id; if(t) cnt[t]=(cnt[t]||0)+1; });
      ranking=Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a]);
    }catch(e){}
  }
  if(ranking.length<10){
    const usage={};
    PRODUCTS.forEach(p=>p.tag_ids.forEach(t=>usage[t]=(usage[t]||0)+1));
    const more=Object.keys(usage).filter(t=>!ranking.includes(t)).sort((a,b)=>usage[b]-usage[a]);
    ranking=ranking.concat(more);
  }
  ranking=ranking.filter(t=>TAG_MASTER[t] && !isClassTag(t)).slice(0,10);
  if(!ranking.length){ grid.innerHTML='<div class="empty">—</div>'; return; }

  const medal=["gold","silver","bronze"];
  let h="";
  ranking.forEach((tid,i)=>{
    const icon=tagIcon(tid);
    const img=icon?'<img src="'+icon+'" onerror="this.style.display=\'none\'">':'<span class="noimg">💊</span>';
    const top3 = i<3 ? ' top3 '+medal[i] : '';
    const rankBadge = i<3
      ? '<span class="rank medal">'+(i+1)+'</span>'
      : '<span class="rank">'+(i+1)+'</span>';
    h+='<div class="topcard'+top3+'" onclick="pickFirstTag(\''+tid+'\')">'+
       rankBadge+
       '<div class="imgbox">'+img+'</div>'+
       '<div class="tname">'+tagName(tid)+'</div></div>';
  });
  grid.innerHTML=h;
}

/* ============================================================
   자연어 검색 (GPT 자유 추출 → 태그 매칭)
   ============================================================ */
async function runQuery(){
  const raw=document.getElementById('q').value.trim();
  if(!raw) return;
  const u=UI[curLang];
  document.getElementById('hint2').textContent=u.thinking;

  // 1) GPT로 문장에서 자유 키워드 추출 (목록 제약 없음)
  let keywords=[];
  if(USE_GPT && USE_FIREBASE){
    keywords=await gptExtractKeywords(raw);
  }
  // GPT 실패/미사용 → 입력어 자체를 키워드로
  if(!keywords.length) keywords=[raw];

  // 2) 각 키워드를 우리 태그에 매칭
  const suggestions=keywords.map(kw=>{
    const tid=matchKeywordToTag(kw);
    return { keyword:kw, tagId:tid };   // tagId 있으면 활성, 없으면 준비중
  });

  // 2b) 제품명 직접 매칭 — 사용자 입력을 단어별로 쪼개 각각 제품명에 매칭
  //     ("시가 멜라"처럼 음성이 띄어 들어와도 시가/멜라 각각 걸리게)
  const words = raw.toLowerCase().split(/\s+/).filter(w=>w.length>=2);
  const seen = new Set();
  let nameHits = [];
  if(words.length){
    PRODUCTS.forEach(p=>{
      const nm=(p.name||"").toLowerCase();
      const hitCount = words.filter(w=>nm.includes(w)).length;
      if(hitCount>0 && !seen.has(p.id)){
        seen.add(p.id); nameHits.push({p, hitCount});
      }
    });
    // 더 많은 단어가 맞은 제품을 위로
    nameHits.sort((a,b)=>b.hitCount-a.hitCount);
    nameHits = nameHits.map(x=>x.p);
  }

  // 로그: 원본 + 매칭결과 (없는 키워드 = 태그 후보)
  const matchedTags=suggestions.filter(s=>s.tagId).map(s=>s.tagId);
  const unmatchedKw=suggestions.filter(s=>!s.tagId).map(s=>s.keyword);
  logQuery(raw, matchedTags, unmatchedKw);

  document.getElementById('hint2').textContent="";

  // 매칭된 태그도 없고 제품명 매칭도 없으면 폴백
  if(!matchedTags.length && !nameHits.length){
    selectedTags=[];
    lastSuggestions=suggestions; lastNameHits=[];
    enterSuggestMode();
    renderSuggestions(suggestions, []);
    showFallback();
    return;
  }

  // 추천 키워드 + 제품명 직접 결과를 함께 표시
  selectedTags=[];
  lastSuggestions=suggestions; lastNameHits=nameHits;
  enterSuggestMode();
  renderSuggestions(suggestions, nameHits);
}

// GPT: 문장에서 관련 키워드를 자유롭게 뽑기 (우리 목록에 얽매이지 않음)
async function gptExtractKeywords(raw){
  try{
    const cfg=await db.collection("settings").doc("config").get();
    const key=cfg.exists?cfg.data().openai_key:"";
    if(!key) return [];
    const prompt=
      "당신은 약국 제품 검색 도우미입니다. 사용자의 문장에서 약국에서 찾을 만한 "+
      "핵심 키워드(증상·부위·효능·성분·제품종류)를 한국어 단어로 뽑아주세요. "+
      "예: '목이 따갑고 아파' → 목, 감기, 염증, 통증. "+
      "짧은 명사 위주, 최대 6개, JSON으로만.\\n"+
      "사용자입력: \""+raw+"\"\\n반환형식: {\"keywords\":[\"단어\",...]}";
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({model:"gpt-4o-mini",messages:[
        {role:"system",content:"You output JSON only."},
        {role:"user",content:prompt}
      ],response_format:{type:"json_object"},temperature:0.2})
    });
    const data=await res.json();
    const parsed=JSON.parse(data.choices[0].message.content);
    return (parsed.keywords||[]).map(s=>String(s).trim()).filter(Boolean).slice(0,6);
  }catch(e){ console.error(e); return []; }
}

// 키워드 하나 → 우리 태그 id (없으면 null)
function matchKeywordToTag(kw){
  const k=kw.toLowerCase();
  // 정확 일치 우선
  let exact=Object.keys(TAG_MASTER).find(id=>{
    const t=TAG_MASTER[id];
    const names=Object.values(t.names||{}).map(s=>(s||"").toLowerCase());
    const syn=(t.synonyms||[]).map(s=>(s||"").toLowerCase());
    return names.includes(k) || syn.includes(k);
  });
  if(exact) return exact;
  // 포함 매칭 (차선)
  return Object.keys(TAG_MASTER).find(id=>{
    const t=TAG_MASTER[id];
    const names=Object.values(t.names||{}).map(s=>(s||"").toLowerCase());
    const syn=(t.synonyms||[]).map(s=>(s||"").toLowerCase());
    return names.some(n=>n&&(n.includes(k)||k.includes(n))) || syn.some(s=>s&&(s.includes(k)||k.includes(s)));
  }) || null;
}

// 추천 키워드 + 제품명 직접 결과 표시
function renderSuggestions(suggestions, productHits){
  const u=UI[curLang];
  const box=document.getElementById('suggestBox');
  productHits = productHits || [];
  let h="";

  // 제품명에 직접 걸린 제품 (있으면 위에 크게)
  if(productHits.length){
    h+='<div class="sectlabel"><span>'+u.prod+'</span> <span class="pill">'+productHits.length+'</span></div>';
    h+='<div class="prodgrid" style="margin-bottom:22px;">';
    productHits.slice(0,24).forEach(p=>{
      const img=p.image?'<img src="'+p.image+'" onerror="this.style.display=\'none\'">':'<span class="noimg">💊</span>';
      h+='<div class="prodcard" onclick="openProduct(\''+p.id+'\')"><div class="imgbox">'+img+'</div><div class="pname">'+p.name+'</div></div>';
    });
    h+='</div>';
  }

  // 관련 키워드 (태그) — 있을 때만
  if(suggestions && suggestions.length){
    h+='<div class="sectlabel"><span>'+u.suggest+'</span></div><div class="nexttags">';
    suggestions.forEach(s=>{
      if(s.tagId){
        const icon=tagIcon(s.tagId);
        const im=icon?'<img class="ti" src="'+icon+'" onerror="this.style.display=\'none\'">':'';
        h+='<span class="nexttag" onclick="pickFirstTag(\''+s.tagId+'\')">'+im+tagName(s.tagId)+'</span>';
      } else {
        h+='<span class="nexttag soon" title="'+u.soon+'">'+escapeH(s.keyword)+' <span class="cnt">'+u.soon+'</span></span>';
      }
    });
    h+='</div>';
  }

  box.innerHTML=h;
}
function escapeH(s){ return (s||"").replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

/* ============================================================
   드릴다운
   ============================================================ */
function pickFirstTag(tid){
  // 첫 태그 로그 (세션 첫 선택만)
  if(!firstTagLogged){ logFirstTag(tid); firstTagLogged=true; }
  if(!selectedTags.includes(tid)) selectedTags.push(tid);
  document.getElementById('suggestBox').innerHTML="";   // 키워드 추천 닫고 드릴다운으로
  enterDrill();
}

function toggleTag(tid){
  const i=selectedTags.indexOf(tid);
  if(i===-1) selectedTags.push(tid); else selectedTags.splice(i,1);
  if(!selectedTags.length){
    // 태그를 다 지웠을 때:
    // 검색으로 들어온 경우 → 방금 본 "관련 키워드" 화면으로 복귀
    // 그냥 Top10에서 들어온 경우 → Top10으로
    if(lastSuggestions){
      enterSuggestMode();
      renderSuggestions(lastSuggestions, lastNameHits);
    } else {
      document.getElementById('suggestBox').innerHTML="";
      document.getElementById('drill').style.display="none";
      document.getElementById('topSection').style.display="block";
      document.getElementById('q').value="";
    }
    return;
  }
  document.getElementById('suggestBox').innerHTML="";
  enterDrill();
}

// 검색 후: 추천 키워드만 보여주는 상태 (드릴다운 아직 아님)
function enterSuggestMode(){
  document.getElementById('topSection').style.display="none";
  document.getElementById('drill').style.display="block";
  // 드릴다운 하위 영역은 비움 (키워드 선택 전)
  document.getElementById('selchips').innerHTML="";
  document.getElementById('countline').innerHTML="";
  document.getElementById('nextLabel').innerHTML="";
  document.getElementById('nexttags').innerHTML="";
  document.getElementById('prodLabel').innerHTML="";
  document.getElementById('prodgrid').innerHTML="";
  document.getElementById('fallbackBox').innerHTML="";
}

function enterDrill(){
  document.getElementById('topSection').style.display="none";
  document.getElementById('drill').style.display="block";
  document.getElementById('q').value="";
  renderDrill();
}

function renderDrill(){
  const u=UI[curLang];
  // 선택 칩
  let ch="";
  selectedTags.forEach(tid=>{
    ch+='<span class="selchip" onclick="toggleTag(\''+tid+'\')">'+tagName(tid)+' <span class="x">✕</span></span>';
  });
  if(selectedTags.length){
    ch+='<button class="resetlink" onclick="resetDrill()">'+u.reset+'</button>';
  }
  document.getElementById('selchips').innerHTML=ch;

  // AND 필터
  const list=PRODUCTS.filter(p=>selectedTags.every(t=>p.tag_ids.includes(t)));
  document.getElementById('countline').innerHTML = u.count(list.length);
  document.getElementById('fallbackBox').innerHTML="";

  // Zero → 폴백
  if(!list.length){ showFallback(); document.getElementById('nexttags').innerHTML=""; document.getElementById('nextLabel').innerHTML=""; document.getElementById('prodLabel').innerHTML=""; document.getElementById('prodgrid').innerHTML=""; return; }

  // 다음 좁힐 태그 (남은 제품에 있는 태그, 선택된 것 제외)
  const usage={};
  list.forEach(p=>p.tag_ids.forEach(t=>{ if(!selectedTags.includes(t)) usage[t]=(usage[t]||0)+1; }));
  const nextIds=Object.keys(usage).filter(t=>TAG_MASTER[t] && !isClassTag(t)).sort((a,b)=>usage[b]-usage[a]).slice(0,12);

  if(nextIds.length){
    document.getElementById('nextLabel').innerHTML='<span>'+u.next+'</span>';
    let nh="";
    nextIds.forEach(tid=>{
      const icon=tagIcon(tid);
      const im=icon?'<img class="ti" src="'+icon+'" onerror="this.style.display=\'none\'">':'';
      nh+='<span class="nexttag" onclick="toggleTag(\''+tid+'\')">'+im+tagName(tid)+' <span class="cnt">'+usage[tid]+'</span></span>';
    });
    document.getElementById('nexttags').innerHTML=nh;
  } else {
    document.getElementById('nextLabel').innerHTML=""; document.getElementById('nexttags').innerHTML="";
  }

  // 제품
  document.getElementById('prodLabel').innerHTML='<span>'+u.prod+'</span> <span class="pill">'+list.length+'</span>';
  let ph="";
  list.slice(0,60).forEach(p=>{
    const img=p.image?'<img src="'+p.image+'" onerror="this.style.display=\'none\'">':'<span class="noimg">💊</span>';
    ph+='<div class="prodcard" onclick="openProduct(\''+p.id+'\')"><div class="imgbox">'+img+'</div><div class="pname">'+p.name+'</div></div>';
  });
  document.getElementById('prodgrid').innerHTML=ph;
}

function resetDrill(){
  selectedTags=[];
  lastSuggestions=null; lastNameHits=[];   // 처음부터 = 검색 맥락도 초기화
  document.getElementById('suggestBox').innerHTML="";
  document.getElementById('drill').style.display="none";
  document.getElementById('topSection').style.display="block";
  document.getElementById('q').value="";
}

// 폴백: 언어권 베스트셀러 Top3 (조회수)
function showFallback(){
  const u=UI[curLang];
  const best=[...PRODUCTS].filter(p=>p.image).sort((a,b)=>b.views-a.views).slice(0,3);
  let h='<div class="fallback"><div class="fbtitle">'+u.fbtitle+'</div><div class="prodgrid">';
  best.forEach(p=>{
    h+='<div class="prodcard" onclick="openProduct(\''+p.id+'\')"><div class="imgbox"><img src="'+p.image+'" onerror="this.style.display=\'none\'"></div><div class="pname">'+p.name+'</div></div>';
  });
  h+='</div></div>';
  document.getElementById('fallbackBox').innerHTML=h;
}

/* ============================================================
   info 모달 (드릴다운 유지)
   ============================================================ */
function openProduct(pid){
  const p=PRODUCTS.find(x=>x.id===pid);
  document.getElementById('modalTitle').textContent=p?p.name:"Product";
  document.getElementById('modalFrame').src=DETAIL_BASE+"?id="+encodeURIComponent(pid)+"&lang="+curLang;
  // QR = card.html 주소를 실시간 생성 (매장 무관, 가격 없음, 선택 언어)
  const cardUrl = CARD_BASE+"?id="+encodeURIComponent(pid)+"&lang="+curLang;
  const qrBox=document.getElementById('modalQR');
  qrBox.innerHTML="";
  try{
    new QRCode(qrBox, { text:cardUrl, width:96, height:96, correctLevel:QRCode.CorrectLevel.M });
  }catch(e){ qrBox.textContent="QR"; }
  document.getElementById('qrText').innerHTML=UI[curLang].qr;
  document.getElementById('modalOv').classList.add('on');
}
function closeModal(){
  document.getElementById('modalOv').classList.remove('on');
  document.getElementById('modalFrame').src="about:blank";
}

/* ============================================================
   로그
   ============================================================ */
function logFirstTag(tid){
  if(!USE_FIREBASE) return;
  db.collection("kiosk_first_tags").add({
    lang:curLang, tag_id:tid, timestamp:firebase.firestore.FieldValue.serverTimestamp()
  }).catch(()=>{});
}
function logQuery(raw, matchedTags, unmatchedKw){
  if(!USE_FIREBASE) return;
  db.collection("kiosk_queries").add({
    lang:curLang, raw_text:raw,
    matched:(matchedTags&&matchedTags.length)>0,
    matched_tags:(matchedTags||[]).slice(0,6),
    unmatched_keywords:(unmatchedKw||[]).slice(0,6),   // 태그로 만들 후보
    timestamp:firebase.firestore.FieldValue.serverTimestamp()
  }).catch(()=>{});
}

/* ============================================================
   음성 (Web Speech API)
   ============================================================ */
let recog=null, listening=false;
function toggleMic(){ listening?stopMic():startMic(); }
function startMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert("Voice not supported on this browser."); return; }
  recog=new SR();
  recog.lang=SPEECH_LANG[curLang]||"en-US";
  recog.interimResults=true; recog.continuous=false;
  recog.onstart=()=>{ listening=true; document.getElementById('micBtn').classList.add('listening'); document.getElementById('hint2').textContent=UI[curLang].listening; };
  recog.onresult=(e)=>{
    let txt=""; for(const r of e.results) txt+=r[0].transcript;
    document.getElementById('q').value=txt;
    if(e.results[e.results.length-1].isFinal){ stopMic(); runQuery(); }
  };
  recog.onerror=()=>{ stopMic(); };
  recog.onend=()=>{ stopMic(); };
  try{ recog.start(); }catch(e){}
}
function stopMic(){
  listening=false;
  document.getElementById('micBtn').classList.remove('listening');
  if(document.getElementById('hint2').textContent===UI[curLang].listening) document.getElementById('hint2').textContent="";
  if(recog){ try{recog.stop();}catch(e){} recog=null; }
}

// Enter로 검색
document.getElementById('q').addEventListener('keydown',e=>{ if(e.key==="Enter"){ e.preventDefault(); runQuery(); }});
